version: "3.9"

services:
  # ── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WC_PROJECT_ID: ${NEXT_PUBLIC_WC_PROJECT_ID}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend (Express + WS + Engine) ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - HTTP_PORT=8081
      - WS_PORT=8080
      - ALLOWED_ORIGINS=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - DATABASE_URL=file:./data/prod.db
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

volumes:
  backend-data:
